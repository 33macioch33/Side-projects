<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Szczęśliwego Dnia Kobiet 🌸</title>
    <style>
        /* ============================================================
       FONTS & RESET
    ============================================================ */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ============================================================
       BACKGROUND GRADIENT
    ============================================================ */
        body {
            min-height: 100vh;
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1, #fce4ec);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ============================================================
       FLOATING HEARTS BACKGROUND
    ============================================================ */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            bottom: -60px;
            font-size: 1.5rem;
            animation: floatUp linear infinite;
            opacity: 0.6;
            user-select: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0.6;
            }

            50% {
                transform: translateY(-50vh) rotate(20deg) scale(1.1);
                opacity: 0.4;
            }

            100% {
                transform: translateY(-110vh) rotate(-10deg) scale(0.8);
                opacity: 0;
            }
        }

        /* ============================================================
       MAIN CARD
    ============================================================ */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 28px;
            padding: 50px 40px;
            max-width: 640px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(233, 30, 99, 0.18);
            animation: cardIn 1s ease both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
       TYPOGRAPHY
    ============================================================ */
        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 700;
            color: #ad1457;
            line-height: 1.25;
            margin-bottom: 18px;
            text-shadow: 0 2px 12px rgba(173, 20, 87, 0.15);
        }

        /* ============================================================
       SHORT MESSAGE — edit here
    ============================================================ */
        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: #c2185b;
            margin-bottom: 36px;
            opacity: 0;
            animation: fadeIn 1s 0.6s ease forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* ============================================================
       DIVIDER
    ============================================================ */
        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #f48fb1, #e91e63, #f48fb1);
            border-radius: 2px;
            margin: 0 auto 36px;
            opacity: 0;
            animation: fadeIn 1s 0.9s ease forwards;
        }

        /* ============================================================
       COUNTER SECTION
    ============================================================ */
        .counter-section {
            margin-bottom: 32px;
            opacity: 0;
            animation: fadeIn 1s 1.1s ease forwards;
        }

        .counter-label {
            font-size: 0.95rem;
            color: #880e4f;
            letter-spacing: 0.04em;
            margin-bottom: 14px;
        }

        .counter-display {
            display: none;
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: #ad1457;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .counter-unit {
            font-size: 1rem;
            color: #c2185b;
            display: block;
            margin-top: 4px;
        }

        /* ============================================================
       BUTTONS
    ============================================================ */
        .btn {
            display: inline-block;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Lato', sans-serif;
            font-weight: 400;
            letter-spacing: 0.05em;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            outline: none;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.04);
            filter: brightness(1.07);
        }

        .btn:active {
            transform: translateY(0) scale(0.97);
        }

        .btn-days {
            background: linear-gradient(135deg, #f48fb1, #e91e63);
            color: #fff;
            padding: 13px 32px;
            font-size: 0.95rem;
            box-shadow: 0 6px 20px rgba(233, 30, 99, 0.35);
        }

        .btn-surprise {
            background: linear-gradient(135deg, #ce93d8, #9c27b0);
            color: #fff;
            padding: 15px 38px;
            font-size: 1rem;
            box-shadow: 0 6px 24px rgba(156, 39, 176, 0.35);
            margin-top: 8px;
        }

        /* ============================================================
       SURPRISE / REASON BOX
    ============================================================ */
        .surprise-section {
            margin-top: 32px;
            opacity: 0;
            animation: fadeIn 1s 1.3s ease forwards;
        }

        .reason-box {
            display: none;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(233, 30, 99, 0.2);
            border-radius: 18px;
            padding: 24px 28px;
            margin-top: 24px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            color: #880e4f;
            line-height: 1.6;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        .reason-box .reason-emoji {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
        }

        /* ============================================================
       CONFETTI CANVAS
    ============================================================ */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* ============================================================
       FOOTER
    ============================================================ */
        .footer {
            margin-top: 36px;
            font-size: 0.78rem;
            color: #c2185b;
            opacity: 0.7;
            letter-spacing: 0.06em;
        }

        /* ============================================================
       BOUQUET BUTTON
    ============================================================ */
        .btn-bouquet {
            background: linear-gradient(135deg, #a5d6a7, #2e7d32);
            color: #fff;
            padding: 13px 30px;
            font-size: 0.95rem;
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.32);
            margin-top: 12px;
        }

        .flower {
            position: fixed;
            bottom: -60px;
            font-size: 2rem;
            pointer-events: none;
            z-index: 2;
            animation: growUp 3.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes growUp {
            0% {
                transform: translateY(0) scale(0.2) rotate(-15deg);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {
                transform: translateY(-95vh) scale(1) rotate(10deg);
                opacity: 0;
            }
        }

        /* ============================================================
       RESPONSIVE
    ============================================================ */
        @media (max-width: 480px) {
            .card {
                padding: 36px 22px;
            }

            .btn-surprise {
                width: 100%;
            }

            .btn-days {
                width: 100%;
            }

            .btn-bouquet {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- Floating hearts layer -->
    <div class="hearts-container" id="heartsContainer"></div>

    <!-- Confetti canvas -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Main card -->
    <div class="card">

        <!-- ============ MAIN TITLE ============ -->
        <h1 class="title">Szczęśliwego Dnia Kobiet Plusińska 🥰❤️</h1>

        <!-- ============ SUBTITLE MESSAGE — zmień wiadomość tutaj ============ -->
        <p class="subtitle">"Odkąd pojawiłaś się w moim życiu stało się ono o wiele lepsze.😘"</p>

        <div class="divider"></div>

        <!-- ============ DAYS COUNTER ============ -->
        <div class="counter-section">
            <p class="counter-label">Pamiętasz ile dni już się znamy? 🌸</p>
            <button class="btn btn-days" onclick="showDays()">Pokaż liczbę dni 💕</button>
            <div class="counter-display" id="counterDisplay">
                <span id="daysNumber">0</span>
                <span class="counter-unit">wspaniałych dni razem 🥹</span>
            </div>
        </div>

        <div class="divider"></div>

        <!-- ============ SURPRISE BUTTON ============ -->
        <div class="surprise-section">
            <button class="btn btn-surprise" onclick="showSurprise()">
                Kliknij po niespodziankę 🎁
            </button>
            <div class="reason-box" id="reasonBox">
                <span class="reason-emoji" id="reasonEmoji">💝</span>
                <span id="reasonText"></span>
            </div>
            <!-- ============ BOUQUET BUTTON ============ -->
            <br />
            <button class="btn btn-bouquet" onclick="spawnBouquet()">
                Podaruj kwiaty 💐
            </button>
        </div>

        <p class="footer">Zrobione z miłością, tylko dla Ciebie 💗</p>
    </div>

    <script>
        /* ============================================================
           KONFIGURACJA — ZMIEŃ TUTAJ
        ============================================================ */

        // ➡️  ZMIEŃ DATĘ ZWIĄZKU  — format: rok, miesiąc (0=styczeń), dzień
        const RELATIONSHIP_START = new Date(2025, 11, 25); // np. 1 stycznia 2024

        // ➡️  LISTA POWODÓW — dodaj lub zmień swoje własne poniżej
        const REASONS = [
            "Uwielbiam jak twoje oczy spoglądają na mnie spod kaptura. 🫦",
            "Uwielbiam ciebie za te mini gifty pluszakowe, to tyle dla mnie znaczy. 👻",
            "Twoje oczka są jedyne w swoim rodzaju. 🥰",
            "Kocham jak się na mnie patrzysz i się uśmiechasz. 😘",
            "Twoje głosówki są cudowne, za każdym razem jak słucham to poprawia mi się humor. 🌸",
            "I love it when you talk about birds even though I still don't understand these animals. 🦜",
            "You are my safe space and my home. 🏡",
            "With you i know i can be myself and i don't have to pretend to be someone else. 🥷",
            "I love when we play games sometimes till late night. 🎮",
            "I love when you say that i am your -babygirl- or -dziecino- it warms my heart. 🥹",
            "Я знаю, что ты многое пережила, и я горжусь тобой за это. 🫠",
            "Я люблю тебя, потому что ты принимаешь меня таким, какой я есть. 😽",
            "Каждый раз, когда мы разговариваем, я погружаюсь в свои мысли, услышав твой голос. 🎵",
            "Мне нравится ощущение, когда мы обнимаемся. Словно весь мир исчезает. 🪂",
            "Я люблю тебя просто за то, кто ты есть, ты потрясающая! 🌹",
        ];

        /* ============================================================
           UNOSZĄCE SIĘ SERCA — generowanie
        ============================================================ */
        // ➡️ DODAJ / USUŃ emoji tła tutaj — 🥥 pojawia się co jakiś czas
        const heartEmojis = ["❤️", "🤍", "💕", "💖", "💗", "🌸", "✨", "🥥", "🥥"];
        const container = document.getElementById("heartsContainer");

        function spawnHeart() {
            const el = document.createElement("span");
            el.className = "heart";
            el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            el.style.left = Math.random() * 100 + "vw";
            el.style.fontSize = (Math.random() * 1.4 + 0.8) + "rem";
            const dur = Math.random() * 8 + 7;
            el.style.animationDuration = dur + "s";
            el.style.animationDelay = Math.random() * 4 + "s";
            container.appendChild(el);
            setTimeout(() => el.remove(), (dur + 4) * 1000);
        }

        // Spawn initial batch then keep spawning
        for (let i = 0; i < 14; i++) setTimeout(spawnHeart, i * 500);
        setInterval(spawnHeart, 1800);

        /* ============================================================
           LICZNIK DNI
        ============================================================ */
        function showDays() {
            const now = new Date();
            const diff = Math.floor((now - RELATIONSHIP_START) / (1000 * 60 * 60 * 24));
            const display = document.getElementById("counterDisplay");
            const num = document.getElementById("daysNumber");

            display.style.display = "block";
            display.style.animation = "none";
            void display.offsetWidth; // reflow trick to restart animation
            display.style.animation = "";

            // Animate count-up
            let current = 0;
            const step = Math.ceil(diff / 60);
            const timer = setInterval(() => {
                current = Math.min(current + step, diff);
                num.textContent = current.toLocaleString("pl-PL");
                if (current >= diff) clearInterval(timer);
            }, 20);
        }

        /* ============================================================
           NIESPODZIANKA — losowy powód + konfetti
        ============================================================ */
        const reasonEmojis = ["💝", "🌹", "💌", "🌸", "✨", "💫", "🥰", "🌷"];
        let lastIndex = -1;

        function showSurprise() {
            // Pick a reason that wasn't shown previously
            let idx;
            do { idx = Math.floor(Math.random() * REASONS.length); } while (idx === lastIndex);
            lastIndex = idx;

            const box = document.getElementById("reasonBox");
            const text = document.getElementById("reasonText");
            const emoji = document.getElementById("reasonEmoji");

            emoji.textContent = reasonEmojis[Math.floor(Math.random() * reasonEmojis.length)];
            text.textContent = "";

            box.style.display = "none";
            void box.offsetWidth;
            box.style.display = "block";

            // ✍️ Efekt maszyny do pisania
            const fullText = REASONS[idx];
            let charIdx = 0;
            if (window._typeTimer) clearInterval(window._typeTimer);
            window._typeTimer = setInterval(() => {
                text.textContent += fullText[charIdx];
                charIdx++;
                if (charIdx >= fullText.length) clearInterval(window._typeTimer);
            }, 38);

            launchConfetti();
        }

        /* ============================================================
           KONFETTI
        ============================================================ */
        const canvas = document.getElementById("confetti-canvas");
        const ctx = canvas.getContext("2d");
        let particles = [];
        let animId = null;

        const COLORS = ["#e91e63", "#f48fb1", "#ce93d8", "#9c27b0", "#fff", "#ffd54f", "#ff8a65"];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: -20,
                r: Math.random() * 7 + 4,
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                vx: (Math.random() - 0.5) * 4,
                vy: Math.random() * 3 + 2,
                angle: Math.random() * 360,
                spin: (Math.random() - 0.5) * 6,
                alpha: 1,
                shape: Math.random() > 0.5 ? "rect" : "circle",
            };
        }

        function launchConfetti() {
            if (animId) { cancelAnimationFrame(animId); particles = []; }
            for (let i = 0; i < 160; i++) {
                const p = createParticle();
                p.y = -20 - Math.random() * 100;
                particles.push(p);
            }
            animateConfetti();
            setTimeout(() => { cancelAnimationFrame(animId); animId = null; ctx.clearRect(0, 0, canvas.width, canvas.height); }, 4500);
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.alpha > 0.05);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.angle += p.spin;
                p.vy += 0.06;
                if (p.y > canvas.height * 0.7) p.alpha -= 0.015;

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.translate(p.x, p.y);
                ctx.rotate((p.angle * Math.PI) / 180);
                if (p.shape === "rect") {
                    ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.5);
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, p.r / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            });
            if (particles.length) animId = requestAnimationFrame(animateConfetti);
        }

        /* ============================================================
           WIRTUALNY BUKIET — kwiatki wyrastają od dołu ekranu
        ============================================================ */
        // ➡️ ZMIEŃ te emoji, żeby dostosować kwiaty w bukiecie
        const flowerEmojis = ["🌹", "🌷", "🌸", "💐", "🌺", "🌼", "🪷"];

        function spawnBouquet() {
            const count = 18; // liczba kwiatków
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const el = document.createElement("span");
                    el.className = "flower";
                    el.textContent = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
                    el.style.left = (5 + Math.random() * 90) + "vw";
                    el.style.fontSize = (1.4 + Math.random() * 1.4) + "rem";
                    el.style.animationDuration = (2.5 + Math.random() * 1.5) + "s";
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 5000);
                }, i * 120);
            }
        }
    </script>
</body>

</html>
